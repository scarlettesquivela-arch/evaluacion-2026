<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe Flash de Inspección - DGR</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* =========================================
           ESTILOS BASE
           ========================================= */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 15px;
        }
        .app-container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid #0033A0;
            box-sizing: border-box;
        }
        .header-title {
            text-align: center;
            color: #0033A0;
            text-transform: uppercase;
            font-size: 22px;
            border-bottom: 2px solid #0099D8;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .section-header {
            background-color: #0099D8;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 15px;
            border-radius: 4px;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        /* DISEÑO DE FORMULARIO */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            width: 100%;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }
        label {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
            color: #444;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }

        /* HALLAZGOS */
        .hallazgo-box {
            background-color: #F8FBFC;
            border: 1px solid #B3E0F5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .hallazgo-title {
            color: #0033A0;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 1px solid #B3E0F5;
            text-align: center;
        }

        /* FOTOS Y FIRMAS */
        .foto-container {
            border: 2px dashed #b3e0f5;
            padding: 10px;
            text-align: center;
            margin-top: 10px;
        }
        .foto-preview {
            display: none;
            max-width: 100%;
            max-height: 250px;
            margin: 10px auto;
            border-radius: 4px;
        }
        canvas {
            border: 1px dashed #999;
            background-color: #f9f9f9;
            width: 100%;
            height: 150px;
            touch-action: none;
        }

        /* BOTONES */
        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-generar {
            flex: 1;
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-descargar { background-color: #0033A0; }
        .btn-limpiar { background-color: #e74c3c; font-size: 11px; padding: 5px; margin-top: 5px; }

        /* REGLAS DE IMPRESIÓN PDF */
        @media print {
            .hide-in-pdf { display: none !important; }
            .avoid-break { break-inside: avoid !important; page-break-inside: avoid !important; }
            .force-page-break { break-before: page !important; page-break-before: always !important; }
            body { background: white; padding: 0; }
            .app-container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container" id="informeContenedor">
    <div class="header-title">
        INFORME FLASH DE INSPECCIÓN<br>
        <span style="font-size: 15px; color: #555; font-weight: normal;">GESTIÓN DE RIESGOS (DGR)</span>
    </div>

    <div class="section-header avoid-break">1. Antecedentes de la Inspección</div>
    <div class="grid-layout avoid-break">
        <div class="form-field">
            <label>Nombre del evaluador:</label>
            <input type="text" id="evaluador">
        </div>
