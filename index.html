<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Servicios - Clínica Alemana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --clinica-verde: #009ca6; --clinica-azul: #003366; }
        .section-header { background-color: var(--clinica-azul); color: white; padding: 10px; border-radius: 4px; margin-top: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .card-pregunta { background: white; border-left: 4px solid var(--clinica-verde); padding: 15px; margin-bottom: 12px; border-radius: 0 8px 8px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        select, input, textarea { border: 1px solid #d1d5db; border-radius: 4px; padding: 6px; font-size: 0.8rem; width: 100%; }
        .label-min { text-transform: uppercase; font-weight: bold; font-size: 10px; color: #6b7280; margin-bottom: 2px; display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div class="max-w-5xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6 flex flex-col items-center border-b-8 border-[#009ca6]">
            <img src="https://www.clinicaalemana.cl/images/default-source/logos/logo-clinica-alemana-svg.svg" alt="Logo" class="h-14 mb-4">
            <h1 class="text-2xl font-black text-[#003366] uppercase">Inspección de Servicios</h1>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Generación de Reporte con Secciones</p>
        </div>

        <div class="bg-white rounded-xl shadow p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><span class="label-min">Evaluador</span><input type="text" id="evaluador"></div>
            <div><span class="label-min">Instalación</span>
                <select id="instalacion">
                    <option value="">Seleccione sede...</option>
                    <option>Clínica Alemana Vitacura</option><option>Clínica Alemana La Dehesa</option><option>Clínica Manquehue Oriente (EMO)</option>
                    <option>Centro Médico Plaza Egaña</option><option>Centro Médico Chicureo</option><option>Centro Médico San Carlos de Apoquindo</option>
                    <option>Centro Médico Rafael Maluenda</option><option>Centro Médico Maitencillo</option><option>Centro Médico La Parva</option>
                    <option>TM Los Dominicos</option><option>TM El Golf</option><option>TM La Reina</option><option>TM Ñuñoa</option>
                    <option>TM Providencia</option><option>TM Tobalaba</option><option>TM Huechuraba</option><option>Sala Cuna</option>
                    <option>Lo Arcaya</option><option>Cowork</option><option>Concilio Vaticano</option>
                </select>
            </div>
            <div><span class="label-min">Unidad / Servicio</span><input type="text" id="servicio"></div>
            <div><span class="label-min">Piso</span><input type="text" id="piso"></div>
            <div class="md:col-span-2"><span class="label-min">Fecha</span><input type="date" id="fecha"></div>
        </div>

        <div id="contenedor-inspeccion"></div>

        <div class="bg-white rounded-xl shadow p-6 mt-8 border-t-8 border-[#009ca6]">
            <h2 class="font-bold text-[#003366] mb-4 text-sm uppercase">Evidencia Fotográfica (Máx 10)</h2>
            <input type="file" id="fotos" accept="image/*" multiple class="text-xs mb-4">
            <div id="preview" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6"></div>
            <button onclick="enviarYDescargarReporte()" class="w-full bg-[#003366] text-white font-black py-5 rounded-lg mt-6 uppercase tracking-widest shadow-xl">
                Enviar a OneDrive y Generar PDF Seccionado
            </button>
        </div>
    </div>

    <script>
        const secciones = [
            { id: "INFRA", t: "1. Infraestructura", q: ["Humedad/filtraciones", "Pisos buen estado", "Paredes/Cielos ok", "Pasillos libres", "Control plagas", "Estructuras seguras"] },
            { id: "SSHH", t: "Servicios Higiénicos", q: ["Dispone de SSHH", "Separados sexo", "Artefactos suficientes", "Distancia < 75m", "Limpieza ok", "Red ok", "Plagas ok"] },
            { id: "VEST", t: "Vestidores", q: ["Existen vestidores", "Independientes", "Casilleros ok"] },
            { id: "ESTAR", t: "Sala de Estar", q: ["Dispone sala estar", "Agua señalizada", "Sin domésticos", "Autorización ok"] },
            { id: "INCEN", t: "2. Extintores", q: ["Adecuados", "Mantención anual", "Fácil acceso", "Certificación", "Estado ok"] },
            { id: "RHUM", t: "Red Húmeda", q: ["Operativa", "Mantención anual", "Gabinete ok", "Señalizada"] },
            { id: "NOTIF", t: "Notifier", q: ["Instrucciones ok", "Señalizados", "Comunicación ok", "Mantención ok"] },
            { id: "ROCI", t: "Rociadores", q: ["Despejados", "Detección humo", "Operativos", "Limpios"] },
            { id: "EVAC", t: "Vías Evacuación", q: ["Libres obstáculos", "Señalización ok", "Apertura fácil", "Puertas ok"] },
            { id: "ELEC", t: "3. Eléctrico", q: ["Cableados ok", "Enchufes ok", "Sin sobrecarga"] }
        ];

        function init() {
            const cont = document.getElementById('contenedor-inspeccion');
            let n = 1;
            secciones.forEach(sec => {
                const h = document.createElement('div'); h.className = 'section-header'; h.innerText = sec.t; cont.appendChild(h);
                sec.q.forEach(txt => {
                    const div = document.createElement('div');
                    div.className = `card-pregunta`;
                    div.innerHTML = `
                        <p class="text-xs font-bold text-gray-700 mb-2">${n}. ${txt}</p>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2">
                            <div><span class="label-min">Estado</span><select id="v_${n}"><option>CUMPLE</option><option>NO CUMPLE</option><option>N/A</option></select></div>
                            <div><span class="label-min">Medida</span><input type="text" id="m_${n}"></div>
                            <div><span class="label-min">Fecha Ejec.</span><input type="date" id="f_${n}"></div>
                            <div><span class="label-min">Resp.</span><input type="text" id="r_${n}"></div>
                        </div>
                        <span class="label-min">Hallazgo</span>
                        <textarea id="h_${n}" class="h-10 text-xs" placeholder="Escriba el hallazgo..."></textarea>
                    `;
                    cont.appendChild(div); n++;
                });
            });
        }

        const imagenesArr = [];
        document.getElementById('fotos').onchange = (e) => {
            const p = document.getElementById('preview'); p.innerHTML = ''; imagenesArr.length = 0;
            Array.from(e.target.files).slice(0, 10).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => { imagenesArr.push(ev.target.result); p.innerHTML += `<img src="${ev.target.result}" class="h-16 w-full object-cover rounded shadow">`; };
                r.readAsDataURL(f);
            });
        };

        async function enviarYDescargarReporte() {
            const eval = document.getElementById('evaluador').value;
            const inst = document.getElementById('instalacion').value;
            const serv = document.getElementById('servicio').value;
            const fech = document.getElementById('fecha').value;

            if(!serv || !fech) return alert("Por favor complete Unidad y Fecha.");

            // 1. ENVÍO A POWER AUTOMATE (Estructura Plana)
            const payload = { evaluador: eval, instalacion: inst, servicio: serv, piso: document.getElementById('piso').value, fecha: fech };
            for(let i=1; i<=45; i++){
                if(document.getElementById(`v_${i}`)){
                    payload[`P${i}_Estado`] = document.getElementById(`v_${i}`).value;
                    payload[`P${i}_Hallazgo`] = document.getElementById(`h_${i}`).value;
                }
            }
            const urlPowerAutomate = "TU_URL_AQUI"; 
            fetch(urlPowerAutomate, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });

            // 2. GENERACIÓN DE PDF SECCIONADO
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            
            // Header
            doc.setFillColor(0, 156, 166); doc.rect(0, 0, 297, 20, 'F');
            doc.setTextColor(255); doc.setFontSize(14); doc.text("INSPECCIÓN DE SERVICIOS - CLÍNICA ALEMANA", 15, 13);
            
            doc.setTextColor(0); doc.setFontSize(9);
            doc.text(`Evaluador: ${eval}`, 15, 28); doc.text(`Instalación: ${inst}`, 110, 28);
            doc.text(`Unidad: ${serv} | Piso: ${document.getElementById('piso').value}`, 15, 33); doc.text(`Fecha: ${fech}`, 110, 33);

            const rowsTable = [];
            let globalCounter = 1;

            secciones.forEach(sec => {
                // Fila de Título de Sección
                rowsTable.push([
                    { content: sec.t, colSpan: 7, styles: { fillColor: [240, 240, 240], fontStyle: 'bold', textColor: [0, 51, 102] } }
                ]);

                // Filas de preguntas
                sec.q.forEach(qText => {
                    const i = globalCounter;
                    rowsTable.push([
                        i, 
                        qText, 
                        document.getElementById(`v_${i}`).value, 
                        document.getElementById(`h_${i}`).value, 
                        document.getElementById(`m_${i}`).value, 
                        document.getElementById(`f_${i}`).value, 
                        document.getElementById(`r_${i}`).value
                    ]);
                    globalCounter++;
                });
            });

            doc.autoTable({
                startY: 40,
                head: [['N°', 'Ítem / Pregunta', 'Estado', 'Hallazgo', 'Medida de Control', 'Fecha Ejec.', 'Responsable']],
                body: rowsTable,
                theme: 'grid',
                headStyles: { fillColor: [0, 51, 102] },
                styles: { fontSize: 6.5, cellPadding: 2 },
                columnStyles: { 0: { cellWidth: 8 }, 1: { cellWidth: 55 }, 2: { cellWidth: 18 }, 3: { cellWidth: 45 }, 4: { cellWidth: 45 }, 5: { cellWidth: 20 }, 6: { cellWidth: 25 } }
            });

            if(imagenesArr.length > 0) {
                doc.addPage('l'); doc.text("REGISTRO FOTOGRÁFICO", 15, 15);
                imagenesArr.forEach((img, i) => {
                    let y = 20 + (Math.floor(i/3) * 55);
                    let x = 15 + ((i % 3) * 90);
                    if(y > 150) { doc.addPage('l'); y = 20; }
                    doc.addImage(img, 'JPEG', x, y, 80, 45);
                });
            }

            doc.save(`Inspección (${serv})-${fech}-${inst}.pdf`);
        }
        window.onload = init;
    </script>
</body>
</html>
