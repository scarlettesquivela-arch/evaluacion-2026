<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Servicios - Clínica Alemana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --clinica-verde: #009ca6; --clinica-azul: #003366; }
        .section-header { background-color: var(--clinica-azul); color: white; padding: 10px; border-radius: 4px; margin-top: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .card-pregunta { background: white; border-left: 4px solid var(--clinica-verde); padding: 15px; margin-bottom: 12px; border-radius: 0 8px 8px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        select, input, textarea { border: 1px solid #d1d5db; border-radius: 4px; padding: 6px; font-size: 0.8rem; width: 100%; }
        .label-min { text-transform: uppercase; font-weight: bold; font-size: 10px; color: #6b7280; margin-bottom: 2px; display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <div class="max-w-4xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6 flex flex-col items-center border-b-8 border-[#009ca6]">
            <img src="https://www.clinicaalemana.cl/images/default-source/logos/logo-clinica-alemana-svg.svg" alt="Logo" class="h-14 mb-4">
            <h1 class="text-2xl font-black text-[#003366] uppercase">Inspección de Servicios</h1>
            <p class="text-xs font-bold text-gray-400">EVALUACIÓN SISTEMÁTICA 2026</p>
        </div>

        <div class="bg-white rounded-xl shadow p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full font-bold text-[#003366] border-b pb-2 text-xs uppercase">Datos Generales</div>
            <div><span class="label-min">Evaluador</span><input type="text" id="evaluador"></div>
            <div><span class="label-min">Instalación</span>
                <select id="instalacion">
                    <option value="">Seleccione sede...</option>
                    <option>Clínica Alemana Vitacura</option><option>Clínica Alemana La Dehesa</option><option>Clínica Manquehue Oriente (EMO)</option>
                    <option>Centro Médico Plaza Egaña</option><option>Centro Médico Chicureo</option><option>Centro Médico San Carlos de Apoquindo</option>
                    <option>Centro Médico Rafael Maluenda</option><option>Centro Médico Maitencillo</option><option>Centro Médico La Parva</option>
                    <option>TM Los Dominicos</option><option>TM El Golf</option><option>TM La Reina</option><option>TM Ñuñoa</option>
                    <option>TM Providencia</option><option>TM Tobalaba</option><option>TM Huechuraba</option><option>Sala Cuna</option>
                    <option>Lo Arcaya</option><option>Cowork</option><option>Concilio Vaticano</option>
                </select>
            </div>
            <div><span class="label-min">Unidad / Servicio</span><input type="text" id="servicio"></div>
            <div><span class="label-min">Piso</span><input type="text" id="piso"></div>
            <div class="md:col-span-2"><span class="label-min">Fecha</span><input type="date" id="fecha"></div>
        </div>

        <div id="contenedor-inspeccion"></div>

        <div class="bg-white rounded-xl shadow p-6 mt-8 border-t-8 border-[#009ca6]">
            <h2 class="font-bold text-[#003366] mb-4 text-sm uppercase">Evidencia Fotográfica (Máx 10)</h2>
            <input type="file" id="fotos" accept="image/*" multiple class="text-xs mb-4">
            <div id="preview" class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6"></div>
            
            <span class="label-min">Observaciones de Cierre</span>
            <textarea id="obs_finales" class="h-20" placeholder="Comentarios generales finales..."></textarea>

            <button onclick="generarPDF()" class="w-full bg-[#003366] text-white font-bold py-4 rounded-lg mt-6 hover:bg-blue-900 transition-all uppercase tracking-widest shadow-lg">
                Generar Informe Final
            </button>
        </div>
    </div>

    <script>
        const cuestionario = [
            { id: "INFRA", t: "1. Infraestructura", q: ["Áreas libres de humedad/filtraciones", "¿Pisos en buen estado y no resbaladizos?", "¿Paredes/Cielos/Ventanas bien mantenidas?", "Pasillos libres de obstáculos", "Control de plagas efectivo", "Elementos estructurales seguros"] },
            { id: "SSHH", t: "Servicios Higiénicos", q: ["Dispone de servicios higiénicos", "Separados por hombres y mujeres", "Artefactos suficientes por turno", "Distancia no superior a 75m", "Buen estado de limpieza", "Red sin filtraciones", "Control de plagas vigente"] },
            { id: "VEST", t: "Vestidores", q: ["Existen vestidores", "Independientes por sexo", "Casilleros suficientes"] },
            { id: "ESTAR", t: "Sala de Estar Personal", q: ["Dispone de sala de estar", "Dispensador de agua señalizado", "Sala libre de artículos domésticos", "Artículos con autorización"] },
            { id: "INCEN", t: "2. Prevención Incendios - Extintores", q: ["Adecuados al riesgo", "Mantención anual", "Sitios fácil acceso/señalizados", "Certificación/Código interno", "Estado manómetro/manguera"] },
            { id: "RHUM", t: "Red Húmeda", q: ["Operativa y buen estado", "Mantención anual", "Gabinete en buen estado", "Redes señalizadas"] },
            { id: "NOTIF", t: "Teléfono Notifier", q: ["Instrucciones buenas condiciones", "Debidamente señalizados", "Comunicación directa central", "Mantención anual"] },
            { id: "ROCI", t: "Rociadores y Detección", q: ["Rociadores despejados", "Sistema detección humo", "Detectores operativos", "Detectores limpios"] },
            { id: "EVAC", t: "Vías de Evacuación", q: ["Libres de obstáculos", "Señalización visible", "Apertura fácil", "Puertas libres de obstáculos"] },
            { id: "ELEC", t: "3. Suministro Eléctrico", q: ["Cableados contenidos", "Enchufes buen estado", "Sin sobrecarga alargadores"] }
        ];

        function renderForm() {
            const cont = document.getElementById('contenedor-inspeccion');
            let n = 1;
            cuestionario.forEach(sec => {
                const header = document.createElement('div'); header.className = 'section-header'; header.innerText = sec.t; cont.appendChild(header);
                sec.q.forEach(txt => {
                    const div = document.createElement('div');
                    div.className = `card-pregunta grp-${sec.id}`;
                    let logic = "";
                    if (n === 7) logic = `onchange="applyLogic(7, 'SSHH')"`;
                    if (n === 14) logic = `onchange="applyLogic(14, 'VEST')"`;
                    if (n === 17) logic = `onchange="applyLogic(17, 'ESTAR')"`;

                    div.innerHTML = `
                        <p class="text-xs font-bold text-gray-700 mb-2">${n}. ${txt}</p>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-3">
                            <div><span class="label-min">Estado</span><select id="v_${n}" ${logic} class="font-bold"><option>CUMPLE</option><option>NO CUMPLE</option><option>N/A</option></select></div>
                            <div><span class="label-min">Medida Control</span><input type="text" id="m_${n}"></div>
                            <div><span class="label-min">Fecha Ejec.</span><input type="date" id="f_${n}"></div>
                            <div><span class="label-min">Responsable</span><input type="text" id="r_${n}"></div>
                        </div>
                        <span class="label-min">Hallazgo Pregunta ${n}</span>
                        <textarea id="h_${n}" class="h-12" placeholder="Describa el hallazgo específico aquí..."></textarea>
                    `;
                    cont.appendChild(div); n++;
                });
            });
        }

        function applyLogic(num, id) {
            const val = document.getElementById(`v_${num}`).value;
            const items = document.querySelectorAll(`.grp-${id}`);
            items.forEach((c, i) => { if(i > 0) c.style.display = (val === 'N/A') ? 'none' : 'block'; });
        }

        const imgData = [];
        document.getElementById('fotos').onchange = (e) => {
            const p = document.getElementById('preview'); p.innerHTML = ''; imgData.length = 0;
            Array.from(e.target.files).slice(0, 10).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => { imgData.push(ev.target.result); p.innerHTML += `<img src="${ev.target.result}" class="h-16 w-full object-cover rounded shadow">`; };
                r.readAsDataURL(f);
            });
        };

        async function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(0, 156, 166); doc.rect(0, 0, 210, 25, 'F');
            doc.setTextColor(255); doc.setFontSize(14); doc.text("INSPECCIÓN DE SERVICIOS - CLÍNICA ALEMANA", 15, 16);
            
            doc.setTextColor(0); doc.setFontSize(8);
            doc.text(`Evaluador: ${document.getElementById('evaluador').value}`, 15, 32);
            doc.text(`Sede: ${document.getElementById('instalacion').value}`, 110, 32);
            doc.text(`Servicio: ${document.getElementById('servicio').value} | Piso: ${document.getElementById('piso').value}`, 15, 38);
            doc.text(`Fecha: ${document.getElementById('fecha').value}`, 110, 38);

            const rows = [];
            let allQ = cuestionario.flatMap(s => s.q);
            for(let i=1; i<=allQ.length; i++) {
                rows.push([i, allQ[i-1], document.getElementById(`v_${i}`).value, document.getElementById(`h_${i}`).value]);
            }

            doc.autoTable({ 
                startY: 45, 
                head: [['N°', 'Ítem Evaluado', 'Estado', 'Hallazgo Específico']], 
                body: rows, 
                headStyles: { fillColor: [0, 51, 102] }, 
                styles: { fontSize: 6 },
                columnStyles: { 1: { cellWidth: 50 }, 3: { cellWidth: 70 } }
            });

            if(imgData.length > 0) {
                doc.addPage(); doc.text("REGISTRO FOTOGRÁFICO", 15, 20);
                imgData.forEach((img, i) => {
                    let y = 25 + (Math.floor(i/2) * 55);
                    let x = (i % 2 === 0) ? 15 : 110;
                    if(y > 250) { doc.addPage(); y = 25; }
                    doc.addImage(img, 'JPEG', x, y, 85, 45);
                });
            }
            doc.save(`Inspeccion_${document.getElementById('instalacion').value || 'CA'}.pdf`);
        }
        window.onload = renderForm;
    </script>
</body>
</html>
