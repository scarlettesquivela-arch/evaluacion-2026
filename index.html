<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Servicios - Clínica Alemana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --clinica-verde: #009ca6; --clinica-azul: #003366; }
        .section-header { background-color: var(--clinica-azul); color: white; padding: 12px; border-radius: 4px; margin-top: 25px; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        .card-pregunta { background: white; border-left: 5px solid var(--clinica-verde); padding: 18px; margin-bottom: 15px; border-radius: 0 8px 8px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.08); }
        select, input, textarea { border: 1px solid #d1d5db; border-radius: 4px; padding: 8px; font-size: 0.85rem; width: 100%; }
        .label-min { text-transform: uppercase; font-weight: bold; font-size: 10px; color: #4b5563; margin-bottom: 4px; display: block; }
        .pregunta-texto { font-size: 0.95rem; color: #1f2937; font-weight: 600; line-height: 1.4; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <div class="max-w-5xl mx-auto p-4">
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6 flex flex-col items-center border-b-8 border-[#009ca6]">
            <img src="https://www.clinicaalemana.cl/images/default-source/logos/logo-clinica-alemana-svg.svg" alt="Logo" class="h-14 mb-4">
            <h1 class="text-2xl font-black text-[#003366] uppercase text-center">Formulario de Inspección de Servicios</h1>
        </div>

        <div class="bg-white rounded-xl shadow p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4 border-t-4 border-[#003366]">
            <div><span class="label-min">Nombre del Evaluador</span><input type="text" id="evaluador"></div>
            <div><span class="label-min">Sede / Instalación</span>
                <select id="instalacion">
                    <option value="">Seleccione...</option>
                    <option>Clínica Alemana Vitacura</option><option>Clínica Alemana La Dehesa</option><option>Clínica Manquehue Oriente (EMO)</option>
                    <option>Centro Médico Plaza Egaña</option><option>Centro Médico Chicureo</option><option>Centro Médico San Carlos de Apoquindo</option>
                    <option>Centro Médico Rafael Maluenda</option><option>Centro Médico Maitencillo</option><option>Centro Médico La Parva</option>
                    <option>TM Los Dominicos</option><option>TM El Golf</option><option>TM La Reina</option><option>TM Ñuñoa</option>
                    <option>TM Providencia</option><option>TM Tobalaba</option><option>TM Huechuraba</option><option>Sala Cuna</option>
                    <option>Lo Arcaya</option><option>Cowork</option><option>Concilio Vaticano</option>
                </select>
            </div>
            <div><span class="label-min">Unidad / Servicio</span><input type="text" id="servicio"></div>
            <div><span class="label-min">Piso</span><input type="text" id="piso"></div>
            <div class="md:col-span-2"><span class="label-min">Fecha de Inspección</span><input type="date" id="fecha"></div>
        </div>

        <div id="contenedor-inspeccion"></div>

        <div class="bg-white rounded-xl shadow p-6 mt-8 border-t-8 border-[#009ca6]">
            <h2 class="font-bold text-[#003366] mb-4 text-sm uppercase">Evidencia Fotográfica (Máx 10)</h2>
            <input type="file" id="fotos" accept="image/*" multiple class="text-sm mb-4">
            <div id="preview" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6"></div>
            
            <button onclick="ejecutarTodo()" class="w-full bg-[#003366] text-white font-black py-5 rounded-lg mt-4 uppercase shadow-xl hover:bg-blue-900 transition-all">
                Enviar a OneDrive y Descargar Reporte
            </button>
        </div>
    </div>

    <script>
        const secciones = [
            { id: "INFRA", t: "1. Infraestructura", q: ["¿Las áreas y superficies de trabajo se encuentran libres de humedad y/o filtraciones?", "¿Los pisos se encuentran en buenas condiciones, sólidos y no resbaladizos?", "¿Las paredes, puertas, cielos rasos y ventanas se encuentran bien mantenidas y limpias?", "¿Los pisos y pasillos se encuentran libres de obstáculos para el libre tránsito?", "¿Se han tomado medidas efectivas para evitar la entrada de insectos, roedores y plagas?", "¿Los elementos estructurales se encuentran en buen estado de conservación?"] },
            { id: "SSHH", t: "Servicios Higiénicos", q: ["¿Dispone de servicios higiénicos (excusado y lavatorio)?", "¿Los servicios higiénicos se encuentran separados para hombres y mujeres?", "¿La cantidad de artefactos sanitarios es suficiente para el personal por turno?", "¿La distancia de los servicios higiénicos no es superior a 75 metros?", "¿Se observa un buen estado de limpieza y funcionamiento?", "¿La red de agua y desagüe se encuentra sin filtraciones visibles?", "¿Existe un servicio de control de plagas vigente en el área?"] },
            { id: "VEST", t: "Vestidores", q: ["¿Existen vestidores destinados al cambio de vestimenta?", "¿Los vestidores están instalados de manera independiente por sexo?", "¿Existen casilleros individuales en cantidad suficiente?"] },
            { id: "ESTAR", t: "Sala de Estar Personal", q: ["¿Dispone de sala de estar habilitada para el consumo de alimentos?", "¿La sala cuenta con dispensador de agua y señalización?", "¿La sala se encuentra libre de artículos domésticos no autorizados?", "¿Los artículos eléctricos cuentan con autorización para su uso?"] },
            { id: "EXTIN", t: "2. Prevención contra Incendios - Extintores", q: ["¿Los extintores son adecuados al tipo de riesgo?", "¿Cuentan con su mantención preventiva anual vigente?", "¿Se ubican en sitios de fácil acceso y señalizados?", "¿Cuentan con Certificación y Código interno visible?", "¿Tienen manómetro, manguera y cilindro en buen estado?"] },
            { id: "RHUM", t: "Red Húmeda", q: ["¿La red de incendio se encuentra operativa y en buen estado?", "¿Cuenta con su mantención preventiva anual realizada?", "¿El gabinete se encuentra en buenas condiciones?", "¿Las redes húmedas se encuentran señalizadas?"] },
            { id: "NOTIF", t: "Teléfono Notifier", q: ["¿Los teléfonos disponen de instrucciones de uso?", "¿Se encuentran debidamente señalizados?", "¿Están operativos con comunicación directa a central?", "¿Cuentan con su mantención preventiva anual?"] },
            { id: "ROCI", t: "Rociadores y Detección", q: ["¿Los rociadores están bien instalados y despejados?", "¿Existe un sistema de detección de humo?", "¿Los detectores se encuentran operativos?", "¿Están libres de restos de pintura y suciedad?"] },
            { id: "EVAC", t: "Vías de Evacuación", q: ["¿Vías de evacuación libres de obstáculos?", "¿Cuentan con señalización de emergencia visible?", "¿Puertas de emergencia son de apertura fácil?", "¿Puertas libres de obstáculos externos e internos?"] },
            { id: "ELEC", t: "3. Suministro Eléctrico", q: ["¿Cableados eléctricos adecuadamente contenidos?", "¿Los enchufes se encuentran en buen estado?", "¿Se evita la sobrecarga mediante alargadores no autorizados?"] }
        ];

        function init() {
            const cont = document.getElementById('contenedor-inspeccion');
            let n = 1;
            secciones.forEach(sec => {
                const h = document.createElement('div'); h.className = 'section-header'; h.innerText = sec.t; cont.appendChild(h);
                sec.q.forEach(txt => {
                    const div = document.createElement('div');
                    div.className = `card-pregunta grp-${sec.id}`;
                    let logic = (n === 7) ? "SSHH" : (n === 14) ? "VEST" : (n === 17) ? "ESTAR" : null;
                    div.innerHTML = `
                        <p class="pregunta-texto mb-3">${n}. ${txt}</p>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                            <div><span class="label-min">Estado</span><select id="v_${n}" ${logic?`onchange="applyLogic(${n},'${logic}')"`:''} class="font-bold"><option>CUMPLE</option><option>NO CUMPLE</option><option>N/A</option></select></div>
                            <div><span class="label-min">Medida Control</span><input type="text" id="m_${n}"></div>
                            <div><span class="label-min">Fecha Ejecución</span><input type="date" id="f_${n}"></div>
                            <div><span class="label-min">Responsable</span><input type="text" id="r_${n}"></div>
                        </div>
                        <span class="label-min">Hallazgo Detectado</span>
                        <textarea id="h_${n}" class="h-14 text-xs"></textarea>
                    `;
                    cont.appendChild(div); n++;
                });
            });
        }

        function applyLogic(num, id) {
            const val = document.getElementById(`v_${num}`).value;
            const items = document.querySelectorAll(`.grp-${id}`);
            items.forEach((c, i) => { if(i > 0) c.style.display = (val === 'N/A') ? 'none' : 'block'; });
        }

        const imagenesArr = [];
        document.getElementById('fotos').onchange = (e) => {
            const p = document.getElementById('preview'); p.innerHTML = ''; imagenesArr.length = 0;
            Array.from(e.target.files).slice(0, 10).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => { imagenesArr.push(ev.target.result); p.innerHTML += `<img src="${ev.target.result}" class="h-16 w-full object-cover rounded shadow border">`; };
                r.readAsDataURL(f);
            });
        };

        async function ejecutarTodo() {
            const eval = document.getElementById('evaluador').value;
            const inst = document.getElementById('instalacion').value;
            const serv = document.getElementById('servicio').value;
            const fech = document.getElementById('fecha').value;
            const piso = document.getElementById('piso').value;

            if(!serv || !fech || !inst) return alert("Complete los datos obligatorios (Unidad, Fecha e Instalación).");

            // 1. ENVÍO HORIZONTAL A EXCEL
            const payload = { evaluador: eval, instalacion: inst, servicio: serv, piso: piso, fecha: fech };
            for(let i=1; i<=45; i++) {
                if(document.getElementById(`v_${i}`)) {
                    payload[`P${i}_Estado`] = document.getElementById(`v_${i}`).value;
                    payload[`P${i}_Hallazgo`] = document.getElementById(`h_${i}`).value;
                    payload[`P${i}_Medida`] = document.getElementById(`m_${i}`).value;
                    payload[`P${i}_FechaEjec`] = document.getElementById(`f_${i}`).value;
                    payload[`P${i}_Resp`] = document.getElementById(`r_${i}`).value;
                }
            }

            const urlPowerAutomate = "TU_URL_AQUI"; 
            fetch(urlPowerAutomate, {
